name: idempotency-and-concurrency-control
# Vi: Docker Compose stack cho bài học Idempotency và Kiểm soát đồng thời.
# (EN: Docker Compose stack for lesson Idempotency and Concurrency Control.)

services:
  # NestJS API — Idempotency-Key + Postgres unique constraint.
  # (EN: NestJS API — Idempotency-Key + Postgres unique constraint.)
  checkout-service:
    image: starciacademy/system-design-idempotency-and-concurrency-control-checkout-service:latest
    container_name: idempotency-and-concurrency-control-checkout-service
    ports:
      # Cổng host 3031 → container 3031.
      # (EN: Host 3031 → container 3031.)
      - "3031:3031"
    environment:
      - PORT=3031
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=checkout_service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - checkout-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Postgres — orders table + unique idempotency_key.
  # (EN: Postgres — orders table + unique idempotency_key.)
  db:
    image: postgres:16-alpine
    container_name: idempotency-and-concurrency-control-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=checkout_service
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d checkout_service"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - checkout-network
    restart: unless-stopped

  # Redis — idempotency PENDING lock + result cache.
  # (EN: Redis — idempotency PENDING lock + result cache.)
  redis:
    image: redis:7-alpine
    container_name: idempotency-and-concurrency-control-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - checkout-network
    restart: unless-stopped

networks:
  checkout-network:
    name: idempotency-and-concurrency-control-network
