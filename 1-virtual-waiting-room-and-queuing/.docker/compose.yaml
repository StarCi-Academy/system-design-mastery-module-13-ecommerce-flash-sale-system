name: 1-virtual-waiting-room-and-queuing
# Vi: Docker Compose stack cho bài học Phòng chờ ảo và Hàng đợi mua hàng.
# (EN: Docker Compose stack for lesson Virtual Waiting Room and Queuing.)

services:
  # NestJS API Service
  api:
    container_name: 1-virtual-waiting-room-and-queuing-api
    image: starciacademy/virtual-waiting-room-and-queuing-waiting-room:latest
    ports:
      # Ánh xạ cổng host 3000 -> container 3000 (HTTP API).
      # (EN: Map host port 3000 -> container 3000 (HTTP API).)
      - "3000:3000"
    environment:
      - PORT=3000
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=waiting_room
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - 1-virtual-waiting-room-and-queuing-network
    depends_on:
      - db
      - redis

  # Postgres Database
  db:
    image: postgres:16-alpine
    container_name: 1-virtual-waiting-room-and-queuing-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=waiting_room
    ports:
      - "5432:5432"
    networks:
      - 1-virtual-waiting-room-and-queuing-network

  # Redis queue position store
  redis:
    image: redis:7-alpine
    container_name: 1-virtual-waiting-room-and-queuing-redis
    ports:
      - "6379:6379"
    networks:
      - 1-virtual-waiting-room-and-queuing-network

networks:
  1-virtual-waiting-room-and-queuing-network:
    name: 1-virtual-waiting-room-and-queuing-network
