name: virtual-waiting-room-and-queuing
# Vi: Docker Compose stack cho bài học Phòng chờ ảo và Hàng đợi.
# (EN: Docker Compose stack for lesson Virtual Waiting Room and Queuing.)

services:
  # NestJS API — Redis ZSET queue + admitted SET.
  # (EN: NestJS API — Redis ZSET queue + admitted SET.)
  waiting-room:
    image: starciacademy/system-design-virtual-waiting-room-and-queuing-waiting-room:latest
    container_name: virtual-waiting-room-and-queuing-waiting-room
    ports:
      # Cổng host 3030 → container 3030.
      # (EN: Host 3030 → container 3030.)
      - "3030:3030"
    environment:
      - PORT=3030
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - waiting-room-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Redis — ZSET queue + admitted SET.
  # (EN: Redis — ZSET queue + admitted SET.)
  redis:
    image: redis:7-alpine
    container_name: virtual-waiting-room-and-queuing-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - waiting-room-network
    restart: unless-stopped

networks:
  waiting-room-network:
    name: virtual-waiting-room-and-queuing-network
