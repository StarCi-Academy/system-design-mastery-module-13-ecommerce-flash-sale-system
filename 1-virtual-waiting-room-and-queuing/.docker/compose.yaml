name: 1-virtual-waiting-room-and-queuing
# Vi: Docker Compose stack cho bài học Phòng chờ ảo và Hàng đợi.
# (EN: Docker Compose stack for lesson Virtual Waiting Room and Queuing.)

services:
  # NestJS API Service
  api:
    container_name: 1-virtual-waiting-room-and-queuing-api
    build:
      context: ../waiting-room
      dockerfile: Dockerfile
    ports:
      # Ánh xạ cổng host 3000 → container 3000 (HTTP API).
      # (EN: Map host port 3000 → container 3000 (HTTP API).)
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - 1-virtual-waiting-room-and-queuing-network
    depends_on:
      - redis

  # Redis — counter / queue / idempotency registry.
  # (EN: Redis — counter / queue / idempotency registry.)
  redis:
    image: redis:7-alpine
    container_name: 1-virtual-waiting-room-and-queuing-redis
    ports:
      # Redis host 6379.
      # (EN: Redis host port 6379.)
      - "6379:6379"
    networks:
      - 1-virtual-waiting-room-and-queuing-network

networks:
  1-virtual-waiting-room-and-queuing-network:
    name: 1-virtual-waiting-room-and-queuing-network
